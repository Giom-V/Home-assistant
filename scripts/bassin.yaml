turn_on_pond_fountain:
  alias: Turn on the pond's fountain
  sequence:
    - if:
        - condition: state
          entity_id: switch.fontaine_bassin
          state: unavailable
      then:
        - action: light.turn_on
          target:
            entity_id: light.pompe_failsafe_light
      else:
        - action: switch.turn_on
          target:
            entity_id: switch.fontaine_bassin
        - wait_template: "{{ is_state('switch.fontaine_bassin', 'on') }}"
          timeout: '00:01:00'
        - if:
            - condition: not
              conditions:
                - condition: state
                  entity_id: switch.fontaine_bassin
                  state: 'on'
          then:
            - action: light.turn_on
              target:
                entity_id: light.pompe_failsafe_light
  icon: mdi:fountain
turn_off_pond_fountain:
  alias: Turn off the pond's fountain
  sequence:
    - if:
        - condition: state
          entity_id: switch.fontaine_bassin
          state: unavailable
      then:
        - action: light.turn_off
          target:
            entity_id: light.pompe_failsafe_light
      else:
        - action: switch.turn_off
          target:
            entity_id: switch.fontaine_bassin
        - wait_template: "{{ is_state('switch.fontaine_bassin', 'off') }}"
          timeout: '00:01:00'
        - if:
            - condition: not
              conditions:
                - condition: state
                  entity_id: switch.fontaine_bassin
                  state: 'off'
          then:
            - action: light.turn_off
              target:
                entity_id: light.pompe_failsafe_light
  icon: mdi:fountain
