- id: '1766581857231'
  alias: Presence simulation Bureau (Away mode)
  description: ''
  triggers:
  - event: sunrise
    offset: '- 01:00:00'
    trigger: sun
  conditions:
  - condition: state
    entity_id: input_boolean.away_mode
    state: 'on'
  - condition: state
    entity_id: person.guillaume
    state: not_home
  - condition: state
    entity_id: person.claire
    state: not_home
  - condition: state
    entity_id: input_boolean.visitors
    state: 'off'
  - condition: state
    entity_id: binary_sensor.people_home
    state: 'off'
  actions:
  - delay: '{{ range(0, 45*60)+1 | random }}'
  - type: turn_on
    device_id: 0a6824f55b50cd544737383fedcb096d
    entity_id: 67b730781c4061abd48a082c52434181
    domain: switch
  - wait_for_trigger:
    - at: input_datetime.presence_simulation_bureau_off
      trigger: time
  - delay: '{{ range(0, 45*60)+1 | random }}'
  - type: turn_off
    device_id: 0a6824f55b50cd544737383fedcb096d
    entity_id: 67b730781c4061abd48a082c52434181
    domain: switch
  - delay: '{{ range(0, 15*60)+1 | random }}'
  - action: cover.close_cover
    metadata: {}
    target:
      entity_id: cover.velux_bureau_roller_shutter
    data: {}
  mode: single
- id: '1766582013297'
  alias: Presence simulation Livingroom (Away mode)
