- id: '1766420297824'
  alias: "Alarme - Intrusion d\xE9tect\xE9e (Away Mode)"
  description: ''
  triggers:
  - entity_id:
    - binary_sensor.porte_bureau_contact
    - binary_sensor.porte_arriere_cuisine_contact
    - binary_sensor.porte_sous_sol_contact
    - binary_sensor.porte_de_derriere_contact
    - binary_sensor.porte_chambre_opening
    to:
    - 'on'
    trigger: state
    from:
    - 'off'
  conditions:
  - condition: state
    entity_id: input_boolean.away_mode
    state: 'on'
    enabled: true
  - condition: state
    entity_id: input_boolean.visitors
    state: 'off'
  - condition: state
    entity_id: binary_sensor.people_home
    state: 'off'
    enabled: true
  - condition: not
    conditions:
    - condition: state
      entity_id: person.claire
      state:
      - home
    - condition: state
      entity_id: person.guillaume
      state:
      - home
      enabled: true
  actions:
  - data:
      text: 'ALERTE INTRUSION : {{ trigger.to_state.attributes.friendly_name }} ouverte
        !'
    action: rest_command.gchatalert
  - data:
      volume_level: 1
    target:
      entity_id: media_player.tous_les_google_home
    action: media_player.volume_set
  - delay: 00:00:02
  - data:
      message: "Ouverture de porte d\xE9tect\xE9e : {{ trigger.to_state.attributes.friendly_name\
        \ }} !  Vous n'avez rien \xE0 faire ici, merci de partir imm\xE9diatement\
        \ !"
    target:
      entity_id: media_player.tous_les_google_home
    action: tts.google_say
  - delay: 00:02:00
  - condition: state
    entity_id: input_boolean.away_mode
    state: 'on'
  - data:
      message: "Intrusion confirm\xE9e ! Dernier avertissement avant appel de la police\
        \ !"
    target:
      entity_id: media_player.tous_les_google_home
    action: tts.google_say
  mode: restart
