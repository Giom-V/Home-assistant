- id: '1766582197231'
  alias: Presence simulation morning (Away mode)
  description: ''
  triggers:
  - trigger: sun
    event: sunrise
    offset: '1:00:00'
  conditions:
  - condition: state
    entity_id: input_boolean.away_mode
    state: 'on'
  - condition: state
    entity_id: person.guillaume
    state: not_home
  - condition: state
    entity_id: person.claire
    state: not_home
  - condition: state
    entity_id: input_boolean.visitors
    state: 'off'
