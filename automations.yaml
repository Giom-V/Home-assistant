- id: '1782074588419'
  alias: Add some water to the pond then stop watering the vegetable garden
  description: ''
  triggers:
  - platform: template
    value_template: '{{ (states(''input_datetime.water_vegetable_garden_off'') | as_datetime
      | as_local - timedelta(minutes=states(''input_number.water_pond_duration'')|int)).strftime(''%H:%M:%S'')
      == states(''sensor.time'') + '':00'' }}'
  conditions: []
  actions:
  - action: switch.turn_on
    metadata: {}
    target:
      entity_id: switch.remplissage_bassin
    data: {}
  - delay: '{{ states(''input_number.water_pond_duration'') | int * 60 }}'
  - action: switch.turn_off
    metadata: {}
    target:
      entity_id:
      - switch.arrosage
      - switch.arrosage_potager
      - switch.remplissage_bassin
    data: {}
  mode: single
