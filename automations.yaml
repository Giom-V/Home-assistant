- id: '1766582732714'
  alias: New automation
  description: ''
  triggers:
  - trigger: numeric_state
    entity_id:
    - sensor.efficacite_panneaux_solaires
    above: 100
  conditions:
  - condition: state
    entity_id: cover.volets_chambre_rose
    state:
    - closed
  - condition: state
    entity_id: sensor.season
    state:
    - winter
    - autumn
  - condition: numeric_state
    entity_id: sensor.temperature_exterieure_solisart
    below: 20
  - condition: time
    after: 09:00:00
  actions:
  - action: script.open_all_first_floor_shutters
    metadata: {}
    data: {}
  - if:
    - condition: state
      entity_id: input_boolean.away_mode
      state:
      - 'off'
    - condition: state
      entity_id: input_boolean.visitors
      state:
      - 'off'
    then:
    - action: script.open_all_ground_floor_shutters
      metadata: {}
      data: {}
  mode: single
- id: '1766583263343'
  alias: Close covers at sunset
  description: ''
  triggers:
  - event: sunset
    offset: -0:15:00
    trigger: sun
  conditions:
  - condition: or
    conditions:
    - condition: numeric_state
      entity_id: sensor.temperature_exterieure_solisart
      below: 10
    - condition: state
      entity_id: input_boolean.away_mode
      state:
      - 'on'
  actions:
  - action: script.close_all_first_floor_shutters
    metadata: {}
    data: {}
  - if:
    - condition: state
      entity_id: input_boolean.away_mode
      state:
      - 'on'
      for:
        hours: 2
        minutes: 0
        seconds: 0
    then:
    - action: script.close_all_group_floor_shutters
      metadata: {}
      data: {}
  mode: single
- id: '1766583635602'
  alias: Block the garage door when we are away
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - input_boolean.away_mode
  conditions: []
  actions:
  - if:
    - condition: state
      entity_id: input_boolean.away_mode
      state:
      - 'on'
    then:
    - action: switch.turn_off
      metadata: {}
      target:
        entity_id: switch.porte_garage
      data: {}
    else:
    - action: switch.turn_on
      metadata: {}
      target:
        entity_id: switch.porte_garage
      data: {}
  mode: single
- id: '1766674593503'
  alias: Turn on/off camera when we are away
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - input_boolean.away_mode
  conditions: []
  actions:
  - if:
    - condition: state
      entity_id: input_boolean.away_mode
      state:
      - 'on'
    then:
    - action: switch.turn_on
      metadata: {}
      target:
        entity_id:
        - switch.terrasse_push_notifications
        - switch.terrasse_siren_on_event
        - switch.salle_a_manger_push_notifications
        - switch.salle_a_manger_siren_on_event
        - switch.sous_sol_push_notifications
        - switch.sous_sol_siren_on_event
      data: {}
    else:
    - action: switch.turn_off
      metadata: {}
      target:
        entity_id:
        - switch.terrasse_push_notifications
        - switch.terrasse_siren_on_event
        - switch.salle_a_manger_push_notifications
        - switch.salle_a_manger_siren_on_event
        - switch.sous_sol_push_notifications
        - switch.sous_sol_siren_on_event
      data: {}
  mode: single
- id: '1766928990060'
  alias: Close covers when away
  description: ''
  triggers:
  - trigger: sun
    event: sunset
    offset: '-1:00:00'
  - trigger: sun
    event: sunset
    offset: '-2:00:00'
  - trigger: numeric_state
    entity_id:
    - sensor.temperature_exterieure_solisart
    below: 5
  conditions:
  - condition: state
    entity_id: input_boolean.away_mode
    state: 'on'
  - condition: state
    entity_id: person.guillaume
    state: not_home
  - condition: state
    entity_id: person.claire
    state: not_home
  - condition: state
    entity_id: input_boolean.visitors
    state: 'off'
  - condition: state
    entity_id: binary_sensor.people_home
    state: 'off'
  - condition: or
    conditions:
    - condition: numeric_state
      entity_id: sensor.temperature_exterieure_solisart
      below: 5
    - condition: sun
      after: sunset
      after_offset: '-1:00:00'
  actions:
  - action: script.close_all_group_floor_shutters
    metadata: {}
    data: {}
  - action: script.close_all_shutters
    metadata: {}
    data: {}
  mode: single
- id: '1767646575900'
  alias: 'Tempo Rouge: Everything only sun during red days'
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - sensor.rte_tempo_couleur_actuelle
    to:
    - Rouge
  - trigger: state
    entity_id:
    - binary_sensor.heure_creuse
    to:
    - 'off'
  conditions:
  - condition: state
    entity_id: sensor.rte_tempo_couleur_actuelle
    state:
    - Rouge
  actions:
  - action: select.select_option
    metadata: {}
    target:
      entity_id:
      - select.mode_eau_chaude
      - select.mode_etage
      - select.mode_rdc
    data:
      option: Solaire seul
  mode: single
- id: '1767646748330'
  alias: 'Tempo Rouge: Reactivate heat pump during off-peak hours'
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - sensor.rte_tempo_couleur_actuelle
    from:
    - Rouge
  - trigger: state
    entity_id:
    - binary_sensor.heure_creuse
    to:
    - 'on'
  conditions:
  - condition: not
    conditions:
    - condition: state
      entity_id: sensor.rte_tempo_couleur_actuelle
      state:
      - inconnu
      - unavailable
      - unknown
    - condition: state
      entity_id: input_boolean.away_mode
      state:
      - 'on'
  actions:
  - action: select.select_option
    metadata: {}
    target:
      entity_id:
      - select.mode_eau_chaude
      - select.mode_etage
      - select.mode_rdc
    data:
      option: Solaire+PAC
  mode: single
