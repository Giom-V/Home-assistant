- id: "1759210471445"
  alias: Fermer les volets d'Aurore à minuit
  description: "Ferme les volets d'Aurore à minuit"
  triggers:
    - trigger: time
      at: 00:00:00
  conditions:
    - condition: not
      conditions:
        - condition: state
          entity_id: sensor.season
          state: summer
  actions:
