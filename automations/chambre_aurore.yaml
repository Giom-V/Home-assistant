- id: "1677099297248"
  alias: Aurore's bed lights
  description: "Allume/éteint les lumières du lit d'Aurore"
  triggers:
    - device_id: e059cad12f0a2c750a56719a911dc8e6
      domain: zha
      type: remote_button_short_press
      subtype: turn_off
      trigger: device
    - domain: mqtt
      device_id: f646eba37247f6ffa88f1d1c3b59ef76
      type: action
      subtype: "off"
      metadata: {}
      trigger: device
  conditions: []
  actions:
    - type: toggle
      device_id: cef49caed9c762db670b6d2a85a15832
      entity_id: switch.aurore_bed_light_switch
      domain: switch
  mode: single
- id: "1677698797768"
  alias: Aurore's room main light bulb
  description: "Allume/éteint l'ampoule principale de la chambre d'Aurore"
  triggers:
    - domain: mqtt
      device_id: f646eba37247f6ffa88f1d1c3b59ef76
      type: action
      subtype: "on"
      metadata: {}
      trigger: device
    - device_id: e059cad12f0a2c750a56719a911dc8e6
      domain: zha
      type: remote_button_short_press
      subtype: turn_on
      trigger: device
  conditions: []
  actions:
    - service: light.toggle
      target:
        entity_id: light.aurores_light_bulb
    - service: light.toggle
      target:
        entity_id: light.lumiere_chambre_aurore
  mode: single
- id: "1679085142205"
  alias: During the day Aurore's light bulb default behavior is On
  description: "Pendant la journée, le comportement par défaut de l'ampoule d'Aurore est 'On'"
  trigger:
    - platform: time
      at: 07:00:00
  condition: []
  action:
    - service: select.select_option
      data:
        option: "On"
      target:
        entity_id: select.aurores_light_bulb_start_up_behavior
  mode: single
- id: "1719993857867"
  alias: Dim up Aurore's light
  description: "Augmente la luminosité de la lumière d'Aurore"
  triggers:
    - device_id: e059cad12f0a2c750a56719a911dc8e6
      domain: zha
      type: remote_button_long_press
      subtype: dim_up
      trigger: device
    - domain: mqtt
      device_id: f646eba37247f6ffa88f1d1c3b59ef76
      type: action
      subtype: brightness_move_up
      trigger: device
  conditions: []
  actions:
    - metadata: {}
      data:
        brightness_step_pct: 66
      target:
        entity_id: light.lumiere_chambre_aurore
      enabled: false
      action: light.turn_on
    - device_id: 7a0af38e25d8a8afb66dba181b664f33
      domain: light
      entity_id: c3acfa362782538431339214f251a5db
      type: brightness_increase
      enabled: false
    - metadata: {}
      data:
        brightness_step_pct: 25
      target:
        entity_id: light.lumiere_chambre_aurore
      action: light.turn_on
  mode: single
- id: "1719993909448"
  alias: Dim down Aurore's light
  description: "Diminue la luminosité de la lumière d'Aurore"
  triggers:
    - device_id: e059cad12f0a2c750a56719a911dc8e6
      domain: zha
      type: remote_button_long_press
      subtype: dim_down
      trigger: device
    - domain: mqtt
      device_id: f646eba37247f6ffa88f1d1c3b59ef76
      type: action
      subtype: brightness_move_down
      trigger: device
  conditions: []
  actions:
    - metadata: {}
      data:
        brightness_step_pct: -20
      target:
        entity_id: light.lumiere_chambre_aurore
      action: light.turn_on
  mode: single
- id: "1719994191328"
  alias: Control Aurore's velux curtains
  description: "Contrôle les rideaux du velux d'Aurore"
  trigger:
    - device_id: e059cad12f0a2c750a56719a911dc8e6
      domain: zha
      platform: device
      type: remote_button_short_press
      subtype: left
      id: "short"
    - device_id: e059cad12f0a2c750a56719a911dc8e6
      domain: zha
      platform: device
      type: remote_button_long_press
      subtype: left
      id: "long"
  condition: []
  action:
    - choose:
        - conditions:
            - condition: trigger
              id: "short"
          sequence:
            - if:
                - condition: device
                  device_id: 8f16b93c4fae1055fc21ef57afca5b0f
                  domain: cover
                  entity_id: 5159b1462f01722c359983c04fea0e28
                  type: is_closed
              then:
                - device_id: 8f16b93c4fae1055fc21ef57afca5b0f
                  domain: cover
                  entity_id: 5159b1462f01722c359983c04fea0e28
                  type: open
              else:
                - device_id: 8f16b93c4fae1055fc21ef57afca5b0f
                  domain: cover
                  entity_id: 5159b1462f01722c359983c04fea0e28
                  type: close
        - conditions:
            - condition: trigger
              id: "long"
          sequence:
            - if:
                - condition: device
                  device_id: 8f16b93c4fae1055fc21ef57afca5b0f
                  domain: cover
                  entity_id: 5159b1462f01722c359983c04fea0e28
                  type: is_closed
              then:
                - device_id: 8f16b93c4fae1055fc21ef57afca5b0f
                  domain: cover
                  entity_id: 5159b1462f01722c359983c04fea0e28
                  type: close
              else:
                - device_id: 8f16b93c4fae1055fc21ef57afca5b0f
                  domain: cover
                  entity_id: 5159b1462f01722c359983c04fea0e28
                  type: open
  mode: single
- id: "1758443142653"
  alias: Switch off Aurore bed light when she sleeps
